orientation: A fresh slate for a new generation of Americans to reimagine our country and build a better future together.
vision:
  - A government that answers to the people, not the other way around.
  - Elections people can trust, where every voice carries real weight.
  - Power constrained by law and transparency, not by norms and good faith.
  - An economy where ordinary people can build stable lives and share in growth.
  - A society where Americans align on what matters without requiring uniformity.
  - Less manipulation, less noise, and a clearer view of reality beyond algorithms.
  - A nation that leads by example instead of force, with strength in stability.
  - A country that acts with empathy and restraint at home and abroad.
