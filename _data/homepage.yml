site_name: USA 2.0
tagline: A shared blueprint for a better tomorrow.
hero_text: Fix the System -> Reduce Corruption -> End Wars -> Restore Trust
primary_cta:
  label: Explore the platform
  href: "#platform"
secondary_cta:
  label: Stay updated
